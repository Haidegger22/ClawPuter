[platformio]
default_envs = m5stack-cardputer

; ──────────────────────────────────────────────────────────────────
; ClawPuter — fork под MiniMax M3 (Haidegger22/ClawPuter)
;
; Upstream:  https://github.com/bryant24hao/ClawPuter   ⭐ 138
; Fork:      https://github.com/Haidegger22/ClawPuter
; Author:    bryant24hao   (@bryant24hao)
; License:   MIT (preserved from upstream — see LICENSE)
;
; Changes from upstream:
;   • WiFiClient → WiFiClientSecure (HTTPS to api.minimax.io:443)
;   • model: "openclaw" → "MiniMax-M3"
;   • Hardcoded WiFi creds + MiniMax API key via build_flags
;   • x509_crt_bundle.bin embedded for TLS root certs
;   • Removed LAN OpenClaw gateway dependency
;   • Direct HTTPS streaming to MiniMax API (OpenAI-compatible)
; ──────────────────────────────────────────────────────────────────

[env:m5stack-cardputer]
platform = espressif32@~6.5.0
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 460800
; CA bundle for TLS (lets WiFiClientSecure trust api.minimax.io)
board_build.embed_files = data/cert/x509_crt_bundle.bin
board_build.partitions = default_8MB.csv
monitor_filters = esp32_exception_decoder
lib_deps =
    m5stack/M5Cardputer@^1.0.2
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; Inject env vars at build time (pulled from `source .env` or shell env)
    -DWIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.WIFI_PASS}\"
    -DOPENCLAW_HOST=\"${sysenv.OPENCLAW_HOST}\"
    -DOPENCLAW_PORT=\"${sysenv.OPENCLAW_PORT}\"
    -DOPENCLAW_TOKEN=\"${sysenv.OPENCLAW_TOKEN}\"
    -DSTT_PROXY_HOST=\"${sysenv.STT_PROXY_HOST}\"
    -DSTT_PROXY_PORT=\"${sysenv.STT_PROXY_PORT}\"
    -DWIFI_SSID2=\"${sysenv.WIFI_SSID2}\"
    -DWIFI_PASS2=\"${sysenv.WIFI_PASS2}\"
    -DOPENCLAW_HOST2=\"${sysenv.OPENCLAW_HOST2}\"
    -DDEFAULT_CITY=\"${sysenv.DEFAULT_CITY}\"

[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
test_filter = test_native
